name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    # Use a matrix to run on both macOS and Linux
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'zulu'
          cache: 'maven' # Caches ~/.m2/repository

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cache RocksDB native builds
        uses: actions/cache@v4
        with:
          path: |
            native/osx-aarch64/src/main/resources/native
            native/linux-x86_64/src/main/resources/native
          key: rocksdb-v11.0.4-${{ matrix.os }}-${{ runner.arch }}

      - name: Build and test
        # On Linux, Maven will now run tests natively on the ELF you just built!
        run: mvn test
