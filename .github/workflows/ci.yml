name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest   # Apple Silicon (arm64); Zig cross-compiles linux targets

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: zulu

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cache RocksDB native builds
        uses: actions/cache@v4
        with:
          path: |
            native/osx-aarch64/src/main/resources/native
            native/linux-x86_64/src/main/resources/native
          key: rocksdb-v10.10.1-${{ runner.os }}-${{ runner.arch }}

      - name: Build and test
        run: mvn test
